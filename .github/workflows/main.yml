name: Build Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: dabao1955/kernel_build_action@main
        with:
          # 1. 內核源碼資訊
          kernel-url: https://github.com/MiCode/Xiaomi_Kernel_OpenSource
          kernel-branch: bsp-klimt-v-oss
          # 小米 6.6 內核配置檔案標準路徑
          config: vendor/klimt_defconfig
          arch: arm64

          # 2. 工具鏈設定 (依照範本選用 AOSP 官方工具)
          aosp-gcc: true
          aosp-clang: true
          # 針對 Android 14/15 內核 (6.6) 建議版本
          android-version: 14
          
          # 3. KernelSU + SusFS 整合 (範本中的 ksu-other 模式)
          ksu: true
          ksu-other: true
          # 使用已整合 SusFS 的 KernelSU-Next 分支
          ksu-url: https://github.com/rifsxd/KernelSU-Next
          ksu-version: next-susfs

          # 4. 輸出設定
          anykernel3: true
